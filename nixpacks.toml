[phases.setup]
nixPkgs = ["php82", "php82Extensions.gd", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.zip", "php82Extensions.bcmath", "php82Extensions.opcache", "composer", "nodejs_20", "nodePackages.npm"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-scripts --no-interaction",
  "npm ci",
  "npm run build"
]

[phases.deploy]
cmds = [
  "php artisan migrate --force",
  "php artisan optimize:clear",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"
